[project]
name = "frappe-bench-devenv"
version = "0.1.0"
description = "Frappe Bench - Monorepo workspace for Frappe Development"
requires-python = ">=3.14"
readme = "README.md"

# Production runtime dependencies resolved into the shared virtualenv.
# Only packages needed at runtime in production containers belong here.
# frappe-bench provides the `bench` CLI used as the entrypoint in
# containers; setuptools is needed at import time by several transitive
# deps that use pkg_resources.
dependencies = [
    "frappe-bench>=5.29.0",
    "setuptools>=80.10.2",
]

# Dev-only tools — included in the devenv shell but excluded from
# production container images to keep them lean.
# Note: mypy is NOT listed here because frappe depends on basedmypy
# (a superset fork that provides the same `mypy` CLI).  Including
# both causes file collisions in the virtualenv.
[dependency-groups]
dev = [
    "pre-commit>=4.5.1",
    "pydantic>=2.12.5",
    "pydantic-core>=2.41.5",
    "pytest>=9.0.2",
    "responses",
    "ruff>=0.15.0",
    "semgrep>=1.145.0",
]

[tool.uv]
# Use uv's workspace feature to manage all apps together
# Mark this as a virtual package - no wheel will be built
package = false
# Resolve conflicts between frappe-bench (the CLI) and frappe (develop):
#   - frappe-bench pins click<8.3, but frappe develop needs click~=8.3.1
#     (the bench code works fine with 8.3.x — _check_nested_chain exists).
#   - frappe-bench caps requests<2.34, but frappe develop needs requests>=2.34.2
#     (the cap is conservative).
override-dependencies = [
  "click~=8.3.1",
  "requests>=2.34.2",
]

# Build-time dependencies for packages that need them but don't declare them.
# These are older Frappe/ERPNext transitive deps that predate PEP 517/518 and
# rely on setuptools/pkg_resources at build time. uv2nix consumes this table so
# the Nix build no longer needs an explicit setuptools overlay
# (see frappe-nix/lib/overrides.nix header comment for the rationale).
[tool.uv.extra-build-dependencies]
"cairocffi" = ["setuptools", "cffi", "pycparser"]
"backcall" = ["setuptools"]
"backoff" = ["setuptools"]
"barcodenumber" = ["setuptools"]
"bleach-allowlist" = ["setuptools"]
