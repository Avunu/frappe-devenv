[tool.uv.workspace]
members = [
    "apps/frappe",
    "apps/erpnext",
    "apps/hrms",
]

[tool.uv.sources]
# Link workspace members as editable installs
frappe = { workspace = true }
erpnext = { workspace = true }
hrms = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build]
# This is a virtual package - workspace root only
skip-excluded-dirs = true

[tool.ruff]
line-length = 110
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]
ignore = ["E501"]  # Line length handled by formatter

[tool.mypy]
python_version = "3.14"
ignore_missing_imports = true
